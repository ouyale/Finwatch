version: "3.9"

services:

  # ── Inference API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed:ro   # mount model artefacts read-only
      - ./data/external:/app/data/external         # ONS cache (read-write)
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow
    restart: unless-stopped

  # ── MLflow tracking server ────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlartifacts
    restart: unless-stopped

  # ── Streamlit dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: api/Dockerfile          # reuses same image
    ports:
      - "8501:8501"
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./data/external:/app/data/external
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped
